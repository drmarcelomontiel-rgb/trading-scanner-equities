name: 🕐 Scanner H1 — Cada hora (NYSE)

on:
  # Corre cada hora en punto de 14:00 a 20:00 UTC.
  # Cubre 10:00–16:00 ET en EDT (verano) y 09:00–15:00 ET en EST (invierno).
  # El script verifica internamente si el mercado está abierto (9:30–16:00 ET).
  schedule:
    - cron: "0 14-20 * * 1-5"

jobs:
  scan-h1:
    name: Scan H1 — todos los activos
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🕐 Ejecutar scanner H1
        env:
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:  ${{ secrets.ALPACA_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py --timeframe H1
